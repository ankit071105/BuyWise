<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuyWise</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #F0FBFC;
      width: 360px;
      min-height: 400px;
      color: #1E293B;
    }
    /* Header */
    .header {
      background: linear-gradient(135deg, #0891B2, #065A86);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo { font-size: 16px; font-weight: 700; color: white; }
    .logo span { font-size: 11px; opacity: 0.8; display: block; font-weight: 400; }
    .zap { width: 32px; height: 32px; background: rgba(255,255,255,0.2); border-radius: 8px;
           display: flex; align-items: center; justify-content: center; font-size: 16px; }

    /* Auth section */
    #auth-section { padding: 20px 16px; }
    #auth-section h3 { font-size: 14px; font-weight: 600; color: #1E293B; margin-bottom: 4px; }
    #auth-section p { font-size: 12px; color: #64748B; margin-bottom: 16px; }
    input {
      width: 100%; padding: 9px 12px; border: 1px solid #CBEFF3;
      border-radius: 10px; background: white; font-size: 12px; color: #1E293B;
      outline: none; margin-bottom: 8px;
    }
    input:focus { border-color: #0891B2; box-shadow: 0 0 0 3px rgba(8,145,178,0.1); }
    button {
      width: 100%; padding: 10px; background: #0891B2; color: white;
      border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #0772A1; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Main section */
    #main-section { padding: 12px 16px; display: none; }
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      background: white; border: 1px solid #CBEFF3;
      border-radius: 10px; padding: 8px 12px; margin-bottom: 12px; font-size: 12px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #059669; flex-shrink: 0; }
    .dot.inactive { background: #94A3B8; }

    /* Detected product */
    #product-detected { display: none; }
    .product-card {
      background: white; border: 1px solid #CBEFF3; border-radius: 12px; padding: 12px; margin-bottom: 10px;
    }
    .product-name { font-size: 12px; font-weight: 600; color: #1E293B; margin-bottom: 6px; line-height: 1.4;
                    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-price { font-size: 18px; font-weight: 700; color: #0891B2; }
    .platform-badge {
      display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase;
      background: #CBEFF3; color: #0772A1; padding: 2px 7px; border-radius: 6px; margin-bottom: 6px;
    }
    /* Score display */
    .score-section {
      background: white; border: 1px solid #CBEFF3; border-radius: 12px; padding: 14px;
      margin-bottom: 10px; text-align: center;
    }
    .score-ring { font-size: 32px; font-weight: 800; }
    .score-label { font-size: 11px; color: #64748B; margin-top: 2px; }
    .score-reason { font-size: 11px; color: #1E293B; margin-top: 8px; line-height: 1.5;
                    padding: 8px; background: #F0FBFC; border-radius: 8px; text-align: left; }
    .score-great   { color: #059669; }
    .score-consider { color: #0891B2; }
    .score-wait    { color: #D97706; }
    .score-avoid   { color: #DC2626; }

    /* Actions */
    .btn-outline {
      background: white; color: #0891B2; border: 1.5px solid #0891B2;
      border-radius: 10px; padding: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; margin-top: 6px;
    }
    .btn-outline:hover { background: #F0FBFC; }

    /* Manual search */
    .divider { text-align: center; font-size: 11px; color: #94A3B8; margin: 10px 0; }
    #manual-url { margin-top: 4px; }
    #loading { text-align: center; padding: 20px; color: #0891B2; font-size: 13px; display: none; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #CBEFF3;
               border-top-color: #0891B2; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg { color: #DC2626; font-size: 11px; margin-top: 6px; display: none; }
    #logout { background: none; color: #94A3B8; font-size: 11px; font-weight: 400; border: none;
              width: auto; margin-top: 12px; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="zap">⚡</div>
    <div class="logo">
      BuyWise
      <span>AI Smart Shopping</span>
    </div>
  </div>

  <!-- Auth section (shown when not logged in) -->
  <div id="auth-section">
    <h3>Sign in to BuyWise</h3>
    <p>Step 1: Enter your BuyWise credentials to activate the extension</p>
    <input type="email" id="ext-email" placeholder="Email" />
    <input type="password" id="ext-password" placeholder="Password" />
    <button id="ext-login-btn">Sign In</button>
    <p id="error-msg"></p>
    <p style="font-size:11px;color:#64748B;margin-top:10px;text-align:center;">
      Don't have an account? <a href="http://localhost:3000/auth/register" target="_blank" style="color:#0891B2;">Sign up free</a>
    </p>
  </div>

  <!-- Main section (shown when logged in) -->
  <div id="main-section">
    <div class="status-bar">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">BuyWise active</span>
    </div>

    <!-- Auto-detected product -->
    <div id="product-detected">
      <div class="product-card">
        <span class="platform-badge" id="ext-platform">Amazon</span>
        <div class="product-name" id="ext-product-name">Detecting product...</div>
        <div class="product-price" id="ext-product-price">—</div>
      </div>

      <div id="loading">
        <div class="spinner"></div>
        <div>Running AI analysis...</div>
      </div>

      <div id="score-section" class="score-section" style="display:none;">
        <div class="score-ring" id="ext-score">—</div>
        <div class="score-label">Buy Score / 10</div>
        <div class="score-reason" id="ext-reasoning">—</div>
      </div>

      <button class="btn-outline" id="ext-track-btn">📌 Track This Product</button>
    </div>

    <!-- Manual URL input -->
    <div class="divider">— or paste a product URL —</div>
    <input type="url" id="manual-url" placeholder="Paste Amazon / Flipkart URL..." />
    <button id="manual-analyze-btn">⚡ Analyze</button>

    <div style="text-align:center;">
      <button id="logout">Sign out</button>
    </div>
  </div>

  <script src="src/popup.js"></script>
</body>
</html>
